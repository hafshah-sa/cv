<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafshah | Software Engineer</title>
    <meta
        name="description"
        content="Portfolio of Hafshah - Software Engineer">
    <meta
        name="theme-color"
        content="#4f46e5">
    <link rel="preconnect"
          href="https://fonts.googleapis.com">
    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/darkmode.css">
</head>

<body class="home">
    <!-- Theme Button -->
    <button
        id="theme-toggle"
        class="theme-btn theme-floating"
        aria-label="Switch Theme"
        title="Dark Mode">
        🌙
    </button>
    <!-- Main Content -->
    <main class="container">
        <header>
            <h1>HAFSHAH</h1>
            <p>Software Engineer</p>
            <div class="divider"></div>
        </header>
        <section class="buttons">
            <!-- CV Indonesia -->
            <a href="cv.html?lang=id" class="btn">
                <i data-lucide="file-text"></i>
                <div class="btn-content">
                    <span class="btn-title">
                        Curriculum Vitae
                    </span>
                    <span class="btn-subtitle">
                        Bahasa Indonesia
                    </span>
                </div>
            </a>
            <!-- CV English -->
            <a href="cv.html?lang=en" class="btn">
                <i data-lucide="languages"></i>
                <div class="btn-content">
                    <span class="btn-title">
                        Curriculum Vitae
                    </span>
                    <span class="btn-subtitle">
                        English Version
                    </span>
                </div>
            </a>
            <!-- Portfolio -->
            <a href="cv.html?lang=en" class="btn">
                <i data-lucide="briefcase-business"></i>
                <div class="btn-content">
                    <span class="btn-title">
                        Portfolio
                    </span>
                    <span class="btn-subtitle">
                        Selected Projects
                    </span>
                </div>
            </a>
        </section>
        <!-- Footer -->
         <footer class="footer">
            Built with using HTML, CSS & JavaScript
            <br><br>
            © 2026 Hafshah
        </footer>
    </main>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script> lucide.createIcons();</script>
    <script src="js/theme.js"></script>
</body>
</html>
