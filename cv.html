<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CV Hafshah</title>

<style>
body{
    margin:0;
    display:flex;
    flex-direction:column;
    height:100vh;
    font-family:Arial,sans-serif;
}

.toolbar{
    padding:15px;
    background:#111;
    display:flex;
    gap:12px;
}

.btn{
    background:white;
    color:#111;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
}

iframe{
    flex:1;
    width:100%;
    border:none;
}
</style>

</head>
<body>

<div class="toolbar">

<a href="index.html" class="btn">
← Back
</a>

<a id="downloadBtn" class="btn" download>
Download PDF
</a>

</div>

<iframe id="viewer"></iframe>

<script>

const params = new URLSearchParams(window.location.search);
const lang = params.get("lang");

const pdf =
lang === "en"
? "assets/cv_eng.pdf"
: "assets/cv_indo.pdf";

document.getElementById("viewer").src = pdf;
document.getElementById("downloadBtn").href = pdf;

</script>

</body>
</html>
