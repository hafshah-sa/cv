<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CV Hafshah</title>
    <meta
        name="description"
        content="Curriculum Vitae of Hafshah">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/darkmode.css">
</head>

<body class="cv-page">
    <!-- TOOLBAR -->
    <header class="toolbar">
        <div class="toolbar-left">
            <a href="index.html" class="btn">
                <span class="icon">❮</span>
                <span>Back</span>
            </a>
            <a id="downloadBtn" class="btn" download>
                <span class="icon">⬇</span>
                <span>Download PDF</span>
            </a>
            <a id="switchBtn" class="btn">
                <span class="icon">🌐</span>
                <span id="switchText">English Version</span>
            </a>
        </div>
        <button
            id="theme-toggle"
            class="theme-btn"
            aria-label="Switch Theme"
            title="Dark Mode">
            🌙
        </button>
    </header>

    <!-- PDF VIEWER -->
    <main class="viewer">
        <iframe
            id="viewer"
            title="Curriculum Vitae">
        </iframe>
    </main>

    <!-- PDF SCRIPT -->
    <script>
    const viewer =
        document.getElementById("viewer");
    const downloadBtn =
        document.getElementById("downloadBtn");
    const switchBtn =
        document.getElementById("switchBtn");
    const switchText =
        document.getElementById("switchText");
    const params =
        new URLSearchParams(window.location.search);
    const lang =
        params.get("lang") || "id";
    const pdf =
        lang === "en"
            ? "assets/cv_eng.pdf"
            : "assets/cv_indo.pdf";
    viewer.src = pdf;
    downloadBtn.href = pdf;
    if(lang === "id"){
        switchBtn.href = "cv.html?lang=en";
        switchText.textContent =
            "English Version";
    }
    else{
        switchBtn.href = "cv.html?lang=id";
        switchText.textContent =
            "Versi Indonesia";
    }
    </script>
</body>
</html>
