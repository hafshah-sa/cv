<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Curriculum Vitae | Hafshah</title>
        <meta
            name="description"
            content="Curriculum Vitae of Hafshah">
        <link rel="preconnect"
              href="https://fonts.googleapis.com">
        <link rel="preconnect"
              href="https://fonts.gstatic.com"
              crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/darkmode.css">
    </head>
    
    <body class="cv-page">
        <!-- TOOLBAR -->
        <header class="toolbar">
            <div class="toolbar-left">
                <a href="index.html" class="btn">
                    <i data-lucide="arrow-left"></i>
                    <div class="btn-content">
                        <span class="btn-title">
                            Back
                        </span>
                        <span class="btn-subtitle">
                            Home
                        </span>
                    </div>
                </a>
                <a id="downloadBtn" class="btn" download>
                    <i data-lucide="download"></i>
                    <div class="btn-content">
                        <span class="btn-title">
                            Download
                        </span>
                        <span class="btn-subtitle">
                            PDF File
                        </span>
                    </div>
                </a>
                <a id="switchBtn" class="btn">
                    <i data-lucide="languages"></i>
                    <div class="btn-content">
                        <span class="btn-title">
                            Language
                        </span>
                        <span
                            id="switchText"
                            class="btn-subtitle">
                            English Version
                        </span>
                    </div>
                </a>
            </div>
            <button
                id="theme-toggle"
                class="theme-btn">
                🌙
            </button>
        </header>
    
        <!-- PDF VIEWER -->
        <main class="viewer">
            <iframe
                id="viewer"
                title="Curriculum Vitae">
            </iframe>
        </main>
    
        <!-- PDF SCRIPT -->
        <script>
        const viewer =
            document.getElementById("viewer");
        const downloadBtn =
            document.getElementById("downloadBtn");
        const switchBtn =
            document.getElementById("switchBtn");
        const switchText =
            document.getElementById("switchText");
        const params =
            new URLSearchParams(window.location.search);
        const lang =
            params.get("lang") || "id";
        const pdf =
            lang === "en"
                ? "assets/CV_Hafshah_English.pdf"
                : "assets/CV_Hafshah_Indonesia.pdf";
        viewer.src = pdf;
        downloadBtn.href = pdf;
        if(lang === "id"){
            switchBtn.href = "cv.html?lang=en";
            switchText.textContent =
                "English Version";
        }
        else{
            switchBtn.href = "cv.html?lang=id";
            switchText.textContent =
                "Versi Indonesia";
        }
        </script>
        <script src="https://unpkg.com/lucide@latest"></script>
        <script>lucide.createIcons();</script>
        <script src="js/theme.js"></script>
    </body>
</html>
